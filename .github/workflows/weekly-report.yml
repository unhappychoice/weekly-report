# Generated by: github-weekly-reporter setup
# Docs: https://github.com/deariary/github-weekly-reporter

name: Weekly Report

on:
  schedule:
    - cron: '0 16 * * 1'  # Monday, 1 hour after daily fetch (Asia/Tokyo)
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD, default: today)'
        required: false
        type: string

permissions:
  contents: write
  pages: write

env:
  SITE_TITLE: 'Dev\nPulse'

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: deariary/github-weekly-reporter@main
        with:
          github-token: ${{ secrets.GH_PAT }}
          username: 'unhappychoice'
          mode: 'weekly'
          language: 'en'
          timezone: 'Asia/Tokyo'
          date: ${{ inputs.date }}
          llm-provider: 'openrouter'
          llm-model: 'stepfun/step-3.5-flash:free'
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
