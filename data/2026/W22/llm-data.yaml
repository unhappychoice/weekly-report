    heading: mdts dominates the activity
    body: mdts received the bulk of my work with 19 PRs, including a 7.29.7 Babel upgrade that added 5,164 lines and removed
      2,542. The changes also cascaded through TypeScript, ESLint, and webpack, ensuring the frontend stack stays
      current.
    chips:
