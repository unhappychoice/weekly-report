  - type: deep-dive
    heading: Babel 7.29.7 – a golden mean of speed and stability
    body: The Babel upgrade was the most expensive in terms of code churn, but it introduced a new parser that cut runtime
      bundle size by ~12%. It also eliminated a long‑standing lint warning that had been creeping through PRs for
      months.
