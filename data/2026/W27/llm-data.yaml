highlights:
  - type: pr
    title: "chore(deps): Bump commander from 14.0.3 to 15.0.0"
    repo: unhappychoice/mdts
    meta: merged this week · +13 -8 · 3 files
    body: "Commander 15 dropped ESM-only support, which is a breaking change for any CommonJS-style loader. This PR was
      paired with a manual 'fix: load commander via dynamic import for ESM compatibility' commit — the only
      non-automated code change of the week, and an important one for the mdts CLI to keep functioning."
    url: https://github.com/unhappychoice/mdts/pull/758
  - type: pr
    title: "chore(deps)(deps): bump gix from 0.84.0 to 0.85.0"
    repo: unhappychoice/splashboard
    meta: merged this week · +67 -86 · 2 files
    body: The gix 0.85.0 bump was categorized as a bug-fix breaking release, and at +67/-86 lines it was the largest single
      lockfile change in the Rust repos this week. Keeping splashboard on the latest gitoxide is important for
      correctness in git operations.
    url: https://github.com/unhappychoice/splashboard/pull/281
  - type: pr
    title: "chore(deps): Bump mermaid from 11.15.0 to 11.16.0 in /packages/frontend"
    repo: unhappychoice/mdts
    meta: merged this week · +30 -33 · 2 files
    body: mdts renders Mermaid diagrams as part of its Markdown-to-TypeScript pipeline, so keeping mermaid current is
      directly user-facing. The 11.16.0 minor bump brought new diagram features that mdts users get for free.
    url: https://github.com/unhappychoice/mdts/pull/808
  - type: pr
    title: "Merge pull request #286 from unhappychoice/chore/sync-llm-pricing"
    repo: unhappychoice/splashboard
    meta: merged this week
    body: "The one non-dependency PR in the splashboard batch: syncing LLM pricing data, which suggests splashboard tracks
      or displays AI model costs as part of its dashboard functionality. A small but genuinely functional update in an
      otherwise dependency-heavy week."
