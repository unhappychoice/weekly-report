  - type: deep-dive
    heading: Rust Cargo Dependency Hygiene
    body: steamfetch’s 20 dependency bumps touched crates like clap, tokio, and reqwest. The largest line delta came from
      the jest PR in mdts (+4298 -6066), but the Rust upgrades were more subtle, ensuring API stability while keeping
      the crate graph lean.
    chips:
