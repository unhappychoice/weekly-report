highlights:
  - type: pr
    title: "chore(deps-dev): Bump jest from 30.4.0 to 30.4.2"
    repo: unhappychoice/mdts
    meta: merged May 16 · +4298 -6066 · 1 file
    body: This PR fixed a breaking change in jest’s test runner and unlocked a critical security patch. The large line delta
      shows the refactor needed to keep the test environment stable.
    url: https://github.com/unhappychoice/mdts/pull/706
  - type: pr
    title: "chore(deps): bump clap from 4.5.57 to 4.6.1"
    repo: unhappychoice/steamfetch
    meta: merged May 15 · +14 -14 · 1 file
    body: Upgrading clap modernized command‑line argument parsing and brought in new features for better UX.
  - type: pr
    title: "feat(fetcher): add gitlab_pipeline_status"
    repo: unhappychoice/splashboard
    meta: merged May 14 · +0 -0 · 0 files
    body: Introduced a new fetcher that pulls pipeline status from GitLab, expanding splashboard’s CI visibility.
  - type: pr
    title: "chore(deps): bump electron from 42.0.0 to 42.0.1"
    repo: bitflyer-tools/cycle-flyer
    meta: merged May 12 · +5 -5 · 2 files
    body: A tiny bump that keeps the Electron runtime secure and compatible with newer Node features.
  - type: release
    title: Release v2.4.0
    repo: unhappychoice/splashboard
    meta: released May 17
    body: This release added GitLab integration and several new fetcher families, marking a major feature milestone.
