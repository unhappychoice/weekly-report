  - type: activity-pattern
    heading: Commit Storm and Rest Days
    body: "The peak was on Wednesday (191 commits), followed by a steep drop on Friday (143). Saturday and Sunday were
      quiet, with 67 and 50 commits respectively. The pattern shows a classic sprint rhythm: heavy work mid‑week,
      winding down for the weekend."
    chips:
