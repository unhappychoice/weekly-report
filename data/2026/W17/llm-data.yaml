        color: green
      - label: repos touched
        value: "6"
        color: default
highlights:
  - type: pr
    title: "feat(fetcher): introduce RealtimeFetcher trait for clock‑like widgets"
    repo: unhappychoice/splashboard
    meta: merged Apr 26 · +272 -65 · 5 files
    body: This PR added a new trait that lets widgets skip disk caching and compute every frame, enabling smooth realtime
      displays like the new clock widget.
  - type: pr
    title: "feat(layout,render): chromeless widgets + content alignment"
    repo: unhappychoice/splashboard
    meta: merged Apr 26 · +308 -56 · 10 files
    body: Chromeless mode removes panel borders and titles, giving dashboards a cleaner look; the new `align` knob also lets
      me center or left‑justify content.
    url: https://github.com/unhappychoice/splashboard/pull/35
  - type: pr
    title: "refactor(render): data‑shape Body + Renderer registry (3‑axis) (#32)"
    repo: unhappychoice/splashboard
    meta: merged Apr 26 · +1658 -301 · 30 files
    body: Decoupled fetcher, data‑shape, and renderer into three axes, unlocking future renderer additions without touching
      the core.
  - type: pr
    title: "chore(deps): bump @mui/x-tree-view from 8.27.2 to 9.0.1 in /packages/frontend"
    repo: unhappychoice/mdts
    meta: merged Apr 26 · +124 -30 · 2 files
    body: Updated the MUI tree view to the latest major release, fixing a deprecation warning that had been creeping in.
