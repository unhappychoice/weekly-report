  - type: deep-dive
    heading: Three‑Axis Renderer Registry
    body: "The refactor in #32 split fetcher, data‑shape, and renderer into three independent axes, eliminating the previous
      coupling that blocked theming and new renderer additions.  It also made the `config.render` option functional, a
      long‑awaited feature for theme authors."
    chips:
      - label: new architecture
        value: 3‑axis
        color: default
      - label: "unblocked #17"
        value: theming
        color: green
      - label: 0 PRs closed
        value: "0"
        color: red
  - type: activity-pattern
    heading: Commit Burst & Quiet Sunday
    body: After a quiet Monday, I hit a 175‑commit Tuesday, followed by a 199‑commit Friday.  Sunday was a lighter 130
      commits but still included the final merge of the RealtimeFetcher PR.
    chips:
      - label: peak
        value: Fri 199
        color: green
      - label: lowest
        value: Mon 100
        color: red
  - type: tech-debt
    heading: Dependency Avalanche
    body: Across six repos I closed 18 dependency PRs, bumping @mui/x-tree-view, axios, json, bigdecimal, and more.  Keeping
      these up‑to‑date reduces build failures and security gaps.
    chips:
      - label: deps merged
