    heading: Repo Activity Heatmap
    body: Splashboard leads with 96 PRs and zero issues; mdts, gitlogue, and gittype each had a handful of PRs.  Dependency
      bumps were the most common activity in the other repos, keeping them aligned with the latest security patches.
