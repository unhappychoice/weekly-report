    body: "Buried under ~160 automated snapshot refreshes were two genuine feature PRs on my personal site. PR #9 added tab
      navigation below the hero with per-tab card styling and font-weight active states, while PR #8 wired up a GitHub
      profile link. The refactor also separated tabs from the hero component and shared the hero across the OSS page —
      small architectural cleanup that makes future additions easier."
