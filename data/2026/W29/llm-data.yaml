highlights:
  - type: pr
    title: "chore(deps)(deps): bump feed-rs from 2.3.1 to 2.4.0"
    repo: unhappychoice/splashboard
    meta: merged Jul 2026 · +14 -14 · 1 file
    body: This one was motivated by RUSTSEC-flagged security advisory, making it the most consequential of the dep bumps
      this week — not just routine version chasing but an actual security hygiene fix.
    url: https://github.com/unhappychoice/splashboard/pull/290
  - type: pr
    title: "chore(deps-dev): Bump eslint from 10.6.0 to 10.7.0"
    repo: unhappychoice/mdts
    meta: merged Jul 2026 · +3 -228 · 1 file
    body: A net deletion of 225 lines from bumping eslint — the new version clearly cleaned up a lot of generated or
      redundant config, which is a satisfying side effect of a routine dep bump.
    url: https://github.com/unhappychoice/mdts/pull/832
  - type: pr
    title: "chore(deps-dev): Bump @typescript-eslint/parser from 8.63.0 to 8.64.0 in /packages/frontend"
    repo: unhappychoice/mdts
    meta: merged Jul 2026 · +234 -9 · 2 files
    body: The largest single diff of the week at +234 lines, driven by Dependabot rebasing the PR mid-flight — a reminder
      that even routine dep bumps can get complicated in monorepo setups.
    url: https://github.com/unhappychoice/mdts/pull/838
  - type: pr
    title: "chore(deps): bump json from 2.21.0 to 2.21.1"
    repo: circleci-tools/circleci-cli
    meta: merged Jul 2026 · +1 -1 · 1 file
    body: "The most cross-repo bump of the week: the json gem from 2.20.0/2.21.0 to 2.21.1 landed in at least five separate
      repos (terminal_image, slack_channel_stats, blog, bitflyer-cli, bitflyer, circleci-cli, irasutoya), making it the
      unofficial theme dep of the week."
    url: https://github.com/circleci-tools/circleci-cli/pull/1033
