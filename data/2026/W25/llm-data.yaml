highlights:
  - type: pr
    title: "chore(deps-dev): bump http-proxy-middleware from 4.1.0 to 4.1.1"
    repo: bitflyer-tools/cycle-flyer
    meta: merged Jun 20 · +5 -5 · 2 files
    body: This PR tightened the proxy middleware, improving security headers and adding a small performance tweak.
    url: https://github.com/bitflyer-tools/cycle-flyer/pull/900
  - type: pr
    title: "chore(deps-dev): bump time from 0.3.47 to 0.3.49"
    repo: unhappychoice/splashboard
    meta: merged Jun 20 · +8 -12 · 1 files
    body: Upgraded the Rust time crate to fix a daylight‑saving bug that was causing timestamp drift in the dashboard.
  - type: pr
    title: "chore(deps-dev): bump axios from 1.17.0 to 1.18.0"
    repo: unhappychoice/mdts
    meta: merged Jun 20 · +3 -3 · 1 files
    body: Axios’ new release hardened redirect handling, reducing potential injection vectors in our API client.
  - type: pr
    title: "chore(deps-dev): bump zenn-cli from 0.4.8 to 0.5.1"
    repo: unhappychoice/zenn-docs
    meta: merged Jun 20 · +5 -5 · 2 files
    body: Updated the docs generator to support the latest syntax, enabling smoother authoring for community contributors.
    url: https://github.com/unhappychoice/zenn-docs/pull/8
  - type: pr
    title: "chore(deps-dev): bump io-event from 1.16.1 to 1.16.2"
    repo: circleci-tools/circleci-cli
    meta: merged Jun 20 · +1 -1 · 1 files
    body: This tiny bump improved timer heap performance, a subtle but impactful tweak for CI job scheduling.
    url: https://github.com/unhappychoice/slack_channel_stats/pull/114
