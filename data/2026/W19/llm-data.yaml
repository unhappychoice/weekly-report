title: Splashboard Showcase Gallery and Lobsters Top Fetcher Sprint
subtitle: Merged a five‑page nested gallery and added a new Lobsters story fetcher in the same week.
overview: >
  This week was all about expanding Splashboard's content surface. The main event was the merge of the “showcase
  gallery” PR, which split the monolithic Showcases page into a clean, nested structure with dedicated theme, preset,
  use‑case, and community pages. The PR also introduced three new xtask pipelines that generate gallery content at build
  time, and eight maintainer‑curated dashboards that now land side by side with community submissions.


  While the gallery was the headline, the Lobsters fetcher family also got a fresh entry: `lobsters_top`. It pulls the
  front‑page listings—hottest, newest, active—mirroring the existing HackerNews family. The change also tightens up the
  fetcher architecture and adds a new checkbox in the UI to enable the feature.


  The week also saw a flurry of dependency bumps and minor bug fixes across several repos, but the real architectural
  shift was the gallery’s modularity and the new Lobsters integration, which together make the dashboard far more
  extensible and easier to maintain.
summaries:
  - type: repo-summary
    heading: Splashboard Leads the Charge
    body: Splashboard accounted for the bulk of activity, with 14 PRs merged and 19 commits in total. The focus was on UI
      restructuring, dependency hygiene, and adding new data sources. The repo’s commit volume matched the high density
      of feature work.
    chips:
      - label: splashboard PRs
        value: "14"
        color: default
      - label: splashboard commits
        value: "19"
        color: default
      - label: total commits
        value: "635"
        color: default
  - type: deep-dive
    heading: "Gallery 2.0: Nested Pages & Build‑Time Pipelines"
    body: The showcase gallery PR split a single page into five nested sections, each backed by a dedicated xtask pipeline
      that pre‑renders markdown and metrics. This not only improves performance but also makes it trivial to add new
      themes or community dashboards without touching core React code.
    chips:
