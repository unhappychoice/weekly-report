  - type: activity-pattern
    heading: Commit Surge on Tuesday & Thursday
    body: Commit counts spiked on Tuesday (153) and Thursday (208), coinciding with the big PR merges. The weekend was
      quieter, with the lowest daily commit on Sunday (51). The pattern suggests focused sprint days followed by a
      wind‑down.
    chips:
