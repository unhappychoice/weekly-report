title: Fixing daily-fetch's week range bug and stabilizing the pipeline
subtitle: A cascade of critical bug fixes, test coverage pushes, and dependency upgrades after discovering the core data
  collection was targeting the wrong week.
overview: >
  This week was dominated by a critical discovery: the `daily-fetch` cron job, which runs at midnight, was incorrectly
  collecting data for the *previous* ISO week instead of the current one. This meant on Monday nights, Sunday's
  contributions were permanently lost because the week ID had already rolled over. The fix required a careful rethink of
  the date range logic and triggered a wave of related corrections.


  With the core data pipeline stabilized, the focus shifted to hardening the entire system. This meant improving error
  handling for API rate limits and permissions, preventing private repo leaks in reports, and ensuring incomplete weekly
  reports didn't break the index page navigation. In parallel, a major push brought test coverage from 95% to 97%, and I
  finally got Dependabot configured to automate the endless dependency updates across my entire portfolio.


  The week culminated in a massive, focused burst of 283 commits on Saturday (April 4th), where I merged a backlog of
  dependency updates (Vitest 4, ESLint 10, TypeScript 6) and polished documentation. The rhythm was intense: deep
  debugging early in the week, systematic quality improvements mid-week, and a final sprint to close the loop on
  maintenance tasks.
summaries:
  - type: critical-bug-fix
    heading: The Great Week Range Mix-up
    body: The `daily-fetch` cron, firing at midnight Monday, used a function that targeted the *previous* ISO week. This
      caused Sunday's events to be skipped entirely when the week rolled over. The fix involved creating new
      `buildCurrentWeekRange` and `getCurrentWeekId` functions to correctly target the ongoing week's data, ensuring no
      contributions are lost at week boundaries.
    chips:
      - label: affected PR
        value: "#89"
        color: red
      - label: impact
        value: data loss prevention
        color: default
      - label: files changed
        value: "6"
        color: default
  - type: testing
    heading: Pushing Test Coverage to 97%
    body: After the initial stability fixes, I targeted the remaining coverage gaps. By adding 19 new test cases across 5
      files, I increased statement coverage from 95.21% to 97.1% and branch coverage from 87.81% to 90.7%. Key modules
      like `render.ts` and `deploy.ts` now hit 99-100% coverage, giving me confidence in the refactoring and bug-fix
      changes.
    chips:
      - label: coverage gain
        value: +1.89pt
        color: green
      - label: new tests
        value: "19"
        color: default
      - label: modules at 100%
        value: "3"
        color: default
  - type: devops
    heading: Automation and Hardening
    body: "Two major automation wins: I added Dependabot to automatically open PRs for npm and GitHub Actions dependencies
      (with grouping to reduce noise), and integrated Codecov to track coverage trends. Separately, I hardened the
      GitHub Actions workflows by switching to OIDC for npm publishing (removing NPM_TOKEN) and improved error handling
      in the PR fetch logic to distinguish between rate limits (429) and permission errors (403)."
    chips:
      - label: Dependabot config
        value: added
        color: default
      - label: Codecov
        value: integrated
        color: default
      - label: security fix
        value: PAT vs GITHUB_TOKEN
        color: orange
  - type: activity-pattern
    heading: Saturday Dependency Blitz
    body: "The commit pattern shows a clear peak on Saturday (283 commits), contrasting with more moderate daily activity
      earlier in the week. This was a dedicated 'maintenance blitz' day where I merged a cascade of Dependabot PRs
      bumping major dependencies: Vitest 3.x -> 4.1.2, ESLint 9.x -> 10.2.0, and TypeScript 5.9.3 -> 6.0.2. The volume
      reflects the accumulated technical debt from pinning versions during active development."
    chips:
      - label: peak day
        value: Sat (283 commits)
        color: green
      - label: total commits
        value: "312"
        color: default
      - label: major bumps
        value: Vitest, ESLint, TS
        color: default
  - type: content-creation
    heading: Documentation Overhaul
    body: I significantly restructured the project documentation. The README was streamlined to focus on prerequisites and
      value proposition, with cost and customization details moved to new `docs/` pages (`how-it-works.md`,
      `customization.md`, `faq.md`, `troubleshooting.md`). This separation makes the project more approachable for new
      users while providing deep dives for operators.
    chips:
      - label: new docs pages
        value: "4"
        color: default
      - label: README sections
        value: restructured
        color: default
highlights:
  - type: pr
    title: "fix: daily-fetch collects yesterday's events, not current day's"
    repo: deariary/github-weekly-reporter
    meta: merged Apr 1 · +439 -102 · 9 files
    body: This was the pivotal bug. The `daily-fetch` cron was using the *previous* week's range, causing it to fetch 0
      events mid-week and lose Sunday's data on Monday rollovers. The fix introduced `buildYesterdayRange` to correctly
      target the prior day's contributions.
    url: https://github.com/deariary/github-weekly-reporter/pull/89
  - type: pr
    title: "fix: exclude incomplete weeks from index page and navigation"
    repo: deariary/github-weekly-reporter
    meta: merged Apr 1 · +27 -9 · 2 files
    body: "A direct consequence of the week-range bug: weeks with only `events.yaml` (from daily-fetch) but no completed
      `llm-data.yaml` would appear as broken links. This PR ensures only fully generated reports are listed, preventing
      user confusion."
    url: https://github.com/deariary/github-weekly-reporter/pull/92
  - type: pr
    title: "test: improve test coverage from 95% to 97%"
    repo: deariary/github-weekly-reporter
    meta: merged Apr 2 · +309 -1 · 5 files
    body: A targeted testing push that solidified the recent bug-fix changes. The new tests, especially around date range
      logic and rendering, provide a safety net for future modifications to the core pipeline.
    url: https://github.com/deariary/github-weekly-reporter/pull/87
  - type: pr
    title: "ci: add Dependabot for dependency updates"
    repo: deariary/github-weekly-reporter
    meta: merged Apr 4 · +19 -0 · 2 files
    body: This automation PR will save countless hours going forward. By configuring Dependabot with grouped minor/patch
      updates, the repo will stay current with security patches and ecosystem improvements without manual tracking.
    url: https://github.com/deariary/github-weekly-reporter/pull/76
  - type: release
    title: v0.3.4
    repo: deariary/github-weekly-reporter
    meta: released Apr 3
    body: This patch release bundled the critical `daily-fetch` week-range fix and the private repo exclusion fix,
      delivering the stabilized data collection pipeline to users. It represents the moment the core bug was resolved
      and shipped.
