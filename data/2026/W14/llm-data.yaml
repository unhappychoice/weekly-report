title: Daily-fetch date stabilization lands in github-weekly-reporter
subtitle: Resolved critical timing bugs and enhanced API error handling to ensure reliable data collection.
overview: >
  This week was dedicated to stabilizing the core data pipeline for my github-weekly-reporter project. After discovering
  that daily-fetch was losing event data due to incorrect date ranges, I made it the top priority to fix these bugs and
  strengthen the system against API errors.


  The main narrative involved deep debugging of the cron's date logic. The daily-fetch was using a sliding week window
  and firing at midnight, which caused Sunday's events to be missed on Mondays and mid-week runs to fetch the previous
  week's data. I rewrote the date handling to use UTC ISO timestamps, added comprehensive boundary tests, and improved
  error handling for GitHub API rate limits and permission errors. Alongside, I set up Dependabot and Codecov to
  automate maintenance and track quality.


  With the data collection now reliable, test coverage rose to 97%, and documentation was significantly improved. The
  project is in a much healthier state, ready for further features like enhanced LLM integration.
summaries:
  - type: deep-dive
    heading: Debugging the daily-fetch date disaster
    body: "The daily-fetch cron was collecting the wrong date ranges: on Monday midnight, it flipped to the new week but
      never collected Sunday's events, and mid-week it fetched the previous week's data. I traced this to the use of
      `buildWeeklyRange` and `getWeekId` which target the previous ISO week. The fix involved creating
      `buildCurrentWeekRange` and `getCurrentWeekId` functions with UTC-aware logic, and adding extensive tests to cover
      timezone boundaries."
