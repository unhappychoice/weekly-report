title: Critical daily-fetch bug fixed in github-weekly-reporter
subtitle: Resolved a data loss issue where daily-fetch collected the previous week's events, causing Sunday's data to be
  permanently lost.
overview: >
  This week was consumed by stabilizing the github-weekly-reporter tool, particularly fixing a critical bug in the
  daily-fetch process that caused event data loss. The bug meant that on Mondays, the week ID would flip before Sunday's
  events were collected, resulting in missing data for entire weeks. Multiple related fixes were implemented to ensure
  reliable weekly reporting.


  Alongside the bug fixes, I managed a large-scale dependency update effort across 10+ repositories using Dependabot,
  and significantly improved test coverage in the main repo from 40% to 63%. Commit activity was bursty, with two major
  peaks on April 1st (161 commits) and April 4th (283 commits) corresponding to intensive debugging and merge sessions.


  The focus shifted from feature development to robustness and maintenance, preparing the tool for public release. The
  combination of bug fixes, automation, and testing has put the project in a much healthier state.
summaries:
  - type: bugfix-summary
    heading: daily-fetch week range bug caused data loss
    body: Fixed a critical bug where daily-fetch collected the previous week's events instead of the current week, leading
      to empty event files mid-week. This was particularly problematic on Mondays when the week ID flipped, causing
      Sunday's events to be permanently lost. The fix introduces buildYesterdayRange and getCurrentWeekId to correctly
      target yesterday's date within the current week, ensuring no data is missed.
    chips:
