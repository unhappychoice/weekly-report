  - type: dependency-summary
    heading: Dependabot automation handles 30+ dependency updates
    body: Dependabot opened and merged PRs across 12 repositories, updating npm, GitHub Actions, Rust, and Ruby
      dependencies. This included major version bumps like vitest 4.x and TypeScript 6.0, requiring code adjustments.
      The automation reduced manual maintenance overhead significantly and kept all projects secure and up-to-date.
