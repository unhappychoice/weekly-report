        value: 97%
        color: blue
  - type: activity-pattern
    heading: Burst Day on Tuesday
    body: "My commit rhythm was erratic: 102 on Sunday, then a dip, then a massive 161 on Tuesday and 283 on Saturday. These
      bursts correspond to concentrated debugging and testing sprints. The 283-commit Saturday likely includes many
      merge commits from Dependabot and feature branches. I need to pace better."
