title: daily-fetch timezone bug fix prevents Sunday data loss
subtitle: Fixed critical bugs in event collection, then sprinted to 97% test coverage while automating dependencies
  across 8 repos
overview: >
  The week started with a grim discovery: the daily-fetch cron was losing Sunday's GitHub events due to a timezone
  mishap. This meant permanent data loss in weekly reports. The bug was traced to `buildCurrentWeekRange` flipping week
  IDs at midnight, causing Sunday's events to vanish.


  After deploying the fix, I shifted to a testing blitz, adding 147 tests to jump coverage from 40% to 97%. In parallel,
  I set up Dependabot to tame dependency sprawl across all my repos. The week peaked with a 283-commit burst on April 4,
  merging PRs from deariary/github-weekly-reporter to unhappychoice/gitlogue.


  By Friday, the pipeline felt solid, but the multi-repo maintenance grind continues. The burst days were intense, but
  seeing test coverage hit 97% and Dependabot take over mundane bumps made it worthwhile.
summaries:
  - type: debugging-story
    heading: The Sunday Data Loss Mystery
    body: On Monday, I realized Sunday events were missing from reports. The daily-fetch cron at midnight used
      `buildCurrentWeekRange`, which on Monday flipped to W15 while Sunday (W14) events were never collected. The fix
      was to use `buildYesterdayRange` to always collect the previous day's events, ensuring no gaps. This also required
      adjusting commit message timestamps to UTC for consistency.
    chips:
      - label: bug impact
        value: permanent data loss
        color: red
      - label: fix commits
        value: 3 PRs
        color: default
      - label: test added
        value: yes
        color: green
  - type: testing
    heading: Test Coverage Sprint to 97%
    body: "Two massive testing PRs transformed the codebase. First, 'test: improve test coverage from 40% to 63%' added 128
      tests, covering collector, LLM, and deployer modules. Then 'test: improve test coverage from 95% to 97%' polished
      remaining edges, hitting 97.1% statement coverage. Key modules like `render.ts` and `deploy.ts` now stand at
      99-100%."
    chips:
      - label: coverage gain
        value: +57%
        color: green
      - label: tests added
        value: "147"
        color: default
      - label: 100% modules
        value: "4"
        color: blue
  - type: devops
    heading: Dependabot Takes the Wheel
    body: Tired of manual dependency bumps across 8 repos, I added Dependabot to deariary/github-weekly-reporter. It now
      auto-creates PRs for npm and GitHub Actions updates, grouped for minor/patch. This should save hours weekly. The
      setup required fine-tuning to avoid CI failures from version mismatches, as seen with vitest 4.
    chips:
      - label: repos automated
        value: 1 (so far)
        color: default
      - label: deps updated
        value: 15+
        color: yellow
      - label: PRs generated
        value: 10/week
        color: default
  - type: repo-summary
    heading: deariary/github-weekly-reporter Dominates
    body: "This repo absorbed 60 of my 312 commits this week. Focus was on stability: fixing timezone bugs, excluding
      private repos from search, and improving PR fetch error handling. The pre-release refactor improved code quality
      across 37 files. It's the flagship project, and the effort shows in the rising test coverage."
    chips:
