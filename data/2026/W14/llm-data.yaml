highlights:
  - type: pr
    title: "refactor: improve code quality for public release"
    repo: deariary/github-weekly-reporter
    meta: merged · +1791 -1021 · 37 files
    body: Massive pre-release refactor across 37 files. Removed dead code, improved structure, and made the codebase
      maintainable for external contributors. This was the foundation for everything else—without it, the project
      wouldn't be ready for public eyes.
    url: https://github.com/deariary/github-weekly-reporter/pull/70
  - type: pr
    title: "test: improve test coverage from 95% to 97%"
    repo: deariary/github-weekly-reporter
    meta: merged · +309 -1 · 5 files
    body: Final coverage push to 97%, ensuring critical paths are fully tested. The report rendering and deployment modules
      now have 100% coverage, giving confidence for the upcoming public launch.
    url: https://github.com/deariary/github-weekly-reporter/pull/87
  - type: pr
    title: "fix: daily-fetch collects yesterday's events, not current day's"
    repo: deariary/github-weekly-reporter
    meta: merged · +439 -102 · 9 files
    body: Critical fix for a bug that caused daily-fetch to collect yesterday's events instead of today's. On Mondays at
      midnight, this meant Sunday's events were permanently lost. Fixed by introducing buildYesterdayRange() to
      explicitly target yesterday.
    url: https://github.com/deariary/github-weekly-reporter/pull/89
  - type: pr
    title: "fix: daily-fetch now collects current week events instead of previous week"
    repo: deariary/github-weekly-reporter
    meta: merged · +168 -7 · 6 files
    body: "Second critical date bug: daily-fetch was using previous ISO week functions, causing mid-week runs to return zero
      events. Added getCurrentWeekId() and buildCurrentWeekRange() to target the actual current week."
    url: https://github.com/deariary/github-weekly-reporter/pull/88
