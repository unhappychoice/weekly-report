  - type: deep-dive
    heading: The two date bugs that broke everything
    body: "Discovered that daily-fetch had two separate date-handling bugs: one causing it to collect yesterday's events
      (permanently losing Sunday data on Monday), and another making it query the previous ISO week instead of the
      current one. Fixed the first by switching to a yesterday-range function, and the second by adding current-week
      helpers. Both were subtle timezone/ISO-week calculation errors that only showed up in edge cases."
