  - type: review-summary
    heading: 50 approvals, all green, no drama
    body: Every single one of the 50 reviews this week came back as approved — a reflection of the fact that the vast
      majority were Dependabot PRs where the review is really just a sanity check on the diff. Still, that's 50
      individual repo contexts to context-switch through, spanning Rust crates, Ruby gems, npm packages, Gradle
      dependencies, and GitHub Actions versions. The breadth across circleci-tools, irasutoya-tools, bitflyer-tools, and
      personal repos makes this feel more like portfolio management than traditional code review.
    chips:
