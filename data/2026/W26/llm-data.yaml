title: splashboard v2.10.0 ships project_manifest fetcher with multi-language support
subtitle: "A week dominated by dependency triage across 20+ repos, anchored by a genuine feature: splashboard learning
  to read Cargo.toml, package.json, pyproject.toml, go.mod, and composer.json."
overview: >
  This week was a tale of two modes: one real feature landing in splashboard, and an absolute avalanche of dependency
  maintenance across what feels like half the Rust/Ruby/TypeScript ecosystem. The headline is `feat(fetcher): add
  project_manifest for nearest manifest metadata` — a 823-line addition that teaches splashboard to walk up from CWD and
  extract name, version, description, and license from whichever manifest it finds first. That shipped as part of the
  v2.10.0 release, which also bundled GitHub Enterprise Server support via GH_HOST/GITHUB_HOST.


  The rest of the week was a masterclass in dependency hygiene at scale. Across 20+ repositories spanning Rust, Ruby,
  JavaScript, and GitHub Actions, I reviewed and merged a staggering 50 PRs — mostly Dependabot bumps, but the sheer
  breadth tells a story about how many active projects are in rotation. mdts alone saw 12 PRs land, cycling through
  typescript-eslint, MUI x-tree-view, react-router-dom, and webpack updates. The commit volume peaked hard on Tuesday
  (75) and Wednesday (70), suggesting a focused two-day push to clear the backlog.


  The cross-org reach this week was notable too — circleci-tools, irasutoya-tools, bitflyer-tools, and deariary all got
  attention, with reviews and merges scattered across Ruby gems, Gradle dependencies, and npm packages. It's the kind of
  week where the real work is keeping the lights on across a sprawling portfolio while still finding time to ship
  something new.
summaries:
  - type: deep-dive
    heading: "project_manifest: five ecosystems, one fetcher"
    body: The `project_manifest` fetcher is the most interesting technical work this week — 823 lines added to splashboard
      that implement a priority-ordered manifest search walking up from CWD. It handles Cargo.toml, package.json,
      pyproject.toml (both PEP 621 and Poetry), go.mod, and composer.json, exposing name/version/description/license in
      Text, markdown, and badge output shapes. This shipped alongside GitHub Enterprise Server support
      (GH_HOST/GITHUB_HOST env vars) and a fix for OSC 8 cell width rendering in the same v2.10.0 release. It's a
      genuinely useful addition for anyone running splashboard in a multi-language monorepo.
    chips:
      - label: lines added
        value: "+823"
        color: green
      - label: manifest formats
        value: "5"
        color: default
      - label: release
        value: v2.10.0
