  - type: activity-pattern
    heading: Tuesday/Wednesday surge, then a steady burn
    body: The week opened at a reasonable 33 commits on Monday before exploding to 75 on Tuesday and 70 on Wednesday —
      clearly a focused two-day push to clear the dependency backlog. Thursday dipped to 36 before Friday rebounded to
      65, suggesting a second wind. The weekend bookends (Saturday 55, Sunday 37) show this wasn't a strict 9-to-5 week.
      Total of 225 commits across 7 consecutive days with no zeros is a solid sustained pace.
    chips:
