  - type: repo-summary
    heading: 20+ repos touched, mdts leads the pack
    body: mdts was the busiest repo this week with 12 PRs — a sustained typescript-eslint upgrade cycle (8.61.0 → 8.61.1 →
      8.62.0) plus MUI x-tree-view jumping from 9.4.0 to 9.6.0 and then 9.7.0, react-router-dom 7.17→7.18, and webpack
      bumps. splashboard followed with 7 PRs including the feature work. gittype, circleci-cli, and slack_channel_stats
      each saw 4-5 PRs of Ruby and Rust dependency churn. The cross-org spread — bitflyer-tools, irasutoya-tools,
      circleci-tools, deariary — shows just how wide the maintenance surface is.
    chips:
