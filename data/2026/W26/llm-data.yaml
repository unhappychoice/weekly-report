  - type: contribution-summary
    heading: Cross-org dependency patrol
    body: Beyond personal repos, this week included merges and reviews in circleci-tools/circleci-cli (json, i18n, async,
      io-event Ruby gem bumps), irasutoya-tools/irasutoya and irasutoya-cli (rbs, nokogiri, json),
      bitflyer-tools/DroidFlyer (PubNub Gson), bitflyer-tools/cycle-flyer (Electron 42.5.0), and
      deariary/github-weekly-reporter (actions/checkout v7, Anthropic SDK 0.105.0). The Electron 42.5.0 bump in
      cycle-flyer and the Anthropic SDK jump from 0.100.1 to 0.105.0 in github-weekly-reporter were the most substantive
      cross-org changes.
