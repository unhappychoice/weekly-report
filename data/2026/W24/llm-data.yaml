  - type: deep-dive
    heading: "Splashboard v2.9.0: Network Feature Pack"
    body: The new release adds `net_listening_ports` and `net_vpn`, exposing active sockets and VPN status in a single API
      call.  Coupled with the netstat2 helper, it gives users a unified view of process networking without external
      tooling.
