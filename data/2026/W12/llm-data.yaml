title: Markdown Diff and History Tabs Merge into mdts
subtitle: Implemented new tabs for real-time diff and commit history in the markdown tool, enhancing workflow.
overview: >
  This week was a balancing act between routine dependency maintenance and a significant feature launch in my core
  project, mdts. I spent considerable time ensuring various repositories stayed up-to-date with security patches, while
  also pushing through a long-planned enhancement to the markdown editing workflow.


  The centerpiece was merging the 'feat: add markdown diff view and previous commit history tabs' pull request, which
  adds Diff and History tabs to the markdown content view. This required careful integration of git commands for diff
  output and building a responsive UI with color-coded rendering. Simultaneously, I processed a wave of dependency
  updates across Ruby, Java, and JavaScript projects, including bumps to nokogiri, gradle-wrapper, and json libraries.


  The week wrapped up with an open pull request in ashkulz/committers.top, where I'm fixing a GraphQL API misuse that
  causes incorrect user sorting. This cross-repo collaboration underscores the interconnected nature of open source
  maintenance beyond my own repositories.
summaries:
  - type: feature-launch
    heading: mdts Workflow Enhancement Lands
    body: "The merged feature PR introduces two new tabs to the markdown content view: Diff, which shows uncommitted changes
      via `git diff`, and History, which displays the previous commit's changes via `git diff HEAD~1 HEAD`. Both tabs
      feature color-coded diff rendering, making it easier to track changes over time. This addition directly addresses
      user feedback for better version comparison tools within the editor."
