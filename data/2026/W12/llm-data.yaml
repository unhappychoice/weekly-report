  - type: activity-pattern
    heading: Burst early, steady late
    body: Commit volume peaked on Tuesday (142 commits) and Monday (137), coinciding with the final push on the cross-domain
      analytics feature. The latter half of the week saw a gradual decline (71→64→48→57) as we shifted to content
      reviews and smaller fixes. No zero-commit days, but Friday was the lightest with 48 commits, suggesting a natural
      wind-down after the sprint.
