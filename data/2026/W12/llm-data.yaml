title: _sid parameter unifies cross-domain analytics across deariary
subtitle: Implemented cookie-free session ID passing via URL between app, blog, and LP domains to maintain analytics
  continuity without GDPR consent banners.
overview: >
  This week was defined by two major thrusts: a significant content marketing push for the blog and a technical deep
  dive into cross-domain analytics. I merged 88 PRs across eight repositories, with deariary/blog alone accounting for
  35 of them. The most complex work centered on designing and shipping a session-sharing mechanism using a _sid URL
  parameter, which required coordinated changes across frontend, LP, and backend.


  The analytics feature was the week's technical centerpiece. We needed to track user journeys across our separate
  domains (app.deariary.com, blog.deariary.com, lp.deariary.com) without using cookies, which would trigger GDPR consent
  requirements. The solution involved the SPA appending _sid to outbound links to the LP, the LP adopting that ID into
  sessionStorage and propagating it back to the app, and the backend splitting KPI endpoints by traffic segment to
  accommodate the new session model. Simultaneously, the blog team published five strategic posts and added note.com as
  a distribution channel, dramatically expanding our content footprint.


  The commit pattern showed a classic burst-sprint: Monday (137 commits) and Tuesday (142) were intense as we finalized
  the analytics implementation, then the pace gradually eased through the week as reviews and content integration took
  over. No zero days, but Friday (48 commits) was notably lighter, likely reflecting a natural decompression after the
  big push.
summaries:
  - type: cross-domain-analytics
    heading: Cookie-free session sharing goes live
    body: We shipped the _sid parameter implementation across frontend and LP to maintain analytics continuity when users
      jump between our domains. The frontend captures outbound clicks to LP and rewrites URLs with _sid; LP reads and
      adopts it into sessionStorage, then passes it back to app. Backend KPI endpoints were split by traffic segment
      (app, lp, blog) to accommodate the new session model. No cookies means we stay GDPR-compliant without consent
      banners.
    chips:
      - label: repos involved
        value: 3 (frontend, lp, backend)
        color: default
      - label: lines changed
        value: +210 -4
        color: default
      - label: key benefit
        value: GDPR-compliant tracking
        color: default
  - type: repo-summary
    heading: deariary/blog dominates with 35 PRs
    body: The blog repository was the busiest, with 35 merged PRs focused on content expansion and distribution. We added
      five new strategic blog posts covering core philosophy, competitor comparison, and objection handling, plus
      implemented a new note.com distribution channel with automated cover image generation via satori. This pushes our
      content strategy forward targeting high-value keywords like 'daylio'.
    chips:
      - label: PRs merged
        value: "35"
        color: default
      - label: new posts
        value: "5"
        color: default
      - label: distribution channel
        value: note.com added
        color: default
  - type: pwa-enhancement
    heading: PWA install prompt added to avatar menu
    body: Users can now install the PWA directly from the avatar dropdown in supported environments. The install action
      appears only when the beforeinstallprompt event is available, and we added dedicated i18n keys for the install
      copy across all 42 locales. This should increase PWA adoption from within the app without cluttering the UI for
      unsupported browsers.
    chips:
