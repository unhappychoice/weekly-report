title: "feat: add markdown diff view and previous commit history tabs lands in mdts"
subtitle: A week of focused development on the mdts diff feature, cross-repo dependency maintenance, and contributing
  fixes to external projects.
overview: >
  This week was dominated by the completion and merge of a major feature in my markdown tool mdts: the Diff and History
  tabs. After several iterations based on review feedback, I finally shipped a polished implementation that shows
  uncommitted changes and previous commit diffs directly in the UI. The feature required careful handling of git edge
  cases like initial commits and non-repository files.


  Simultaneously, I was in "dependency update mode" across a dozen repositories—Java, Ruby, JavaScript, and Rust
  projects all received bumps for Gradle, JSON, tree-sitter-rust, and more. I also opened a PR in ashkulz/committers.top
  to fix a subtle GraphQL sorting bug that was causing non-deterministic user rankings, and got my own tool gitlogue
  accepted into awesome-cli-apps.


  The rhythm was burst-driven: heavy commit activity early in the week (peaking at 142 on Tuesday) as I pushed the mdts
  feature over the line, then tapering into review-heavy days managing the resulting dependency updates and cross-repo
  reviews. It was a satisfying mix of deep feature work and broad maintenance.
summaries:
  - type: repo-summary
    heading: "mdts: diff feature dominates"
    body: The mdts repository consumed most of my focus with the Diff and History tabs feature (+878 lines, 21 files). I
      also merged several dependency bumps there, but the feature work was the clear narrative. The implementation
      evolved significantly based on review feedback, especially around edge case handling.
    chips:
      - label: unhappychoice/mdts
        value: 9 PRs
        color: default
      - label: feature lines
        value: +878/-42
        color: blue
  - type: deep-dive
    heading: Git edge cases in a diff viewer
    body: "Building the diff tabs exposed tricky git scenarios: how to handle the initial commit (no HEAD~1), what to show
      when not in a git repo, and ensuring the 'previous commit' actually reflects the last change to the file, not just
      HEAD~1. I had to refactor to use `git log -1 -- <file>` for accurate history and add guards to hide tabs when
      irrelevant."
    chips:
      - label: edge cases handled
        value: "3"
        color: yellow
      - label: refactors
        value: 5 commits
        color: orange
  - type: activity-pattern
    heading: Burst early, review later
    body: "Commit volume peaked sharply on Tuesday (142) and Monday (137) as I pushed the mdts feature, then declined
      steadily through the week. The latter half was review-heavy: 42 reviews total, mostly dependency bumps from
      Dependabot across my various repos, plus feedback on the mdts PR itself from coderabbit."
    chips:
      - label: peak day
        value: Tue 142
        color: green
      - label: total reviews
        value: "42"
        color: purple
  - type: collaboration-summary
    heading: Cross-repo impact
    body: I contributed to 19 distinct repositories this week, spanning my own orgs (unhappychoice, bitflyer-tools,
      circleci-tools) and external projects like ashkulz/committers.top and agarrharr/awesome-cli-apps. The
      committers.top fix improves their user ranking accuracy, and getting gitlogue listed in awesome-cli-apps was a
      nice moment of sharing my own tool.
    chips:
      - label: repos touched
        value: "19"
        color: orange
      - label: external PRs
        value: "2"
        color: pink
highlights:
  - type: pr
    title: "feat: add markdown diff view and previous commit history tabs"
    repo: unhappychoice/mdts
    meta: merged Mar 22 · +878 -42 · 21 files
    body: "The main event: shipped Diff and History tabs in mdts after iterating on review feedback. The Diff tab shows
      uncommitted changes via `git diff`, and History shows the last commit's changes for the file. It required careful
      git edge-case handling and a refactor to use MarkdownRenderer for consistency."
    url: https://github.com/unhappychoice/mdts/pull/599
  - type: pr
    title: "fix: use REST API for user search to fix incorrect sort order"
    repo: ashkulz/committers.top
    meta: opened Mar 18 · +321 -161 · 4 files
    body: Discovered their GraphQL user search used an unsupported `sort:followers` qualifier, causing non-deterministic
      rankings. Fixed by switching to GitHub's REST API with proper `?sort=followers` support, ensuring accurate
      committer rankings.
    url: https://github.com/ashkulz/committers.top/pull/113
  - type: pr
    title: Add gitlogue
    repo: agarrharr/awesome-cli-apps
    meta: merged Mar 20 · +1 -0 · 1 file
    body: Got my cinematic Git replay tool gitlogue accepted into the curated awesome-cli-apps list. A small but meaningful
      validation of a tool I built to make Git history more engaging.
    url: https://github.com/agarrharr/awesome-cli-apps/pull/787
