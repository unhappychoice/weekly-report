    title: "feat: add markdown diff view and previous commit history tabs"
    repo: unhappychoice/mdts
    meta: merged 2026-03-19 · +878 -42 · 21 files
    body: This PR significantly enhances the markdown editing experience by providing built-in diff and history comparison
      tools, reducing the need to switch to external git clients.
    url: https://github.com/unhappychoice/mdts/pull/599
  - type: pr
    title: Add gitlogue
    repo: agarrharr/awesome-cli-apps
