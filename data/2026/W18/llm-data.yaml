title: splashboard 1.2.0 Release + 27 New Fetchers, 19 PRs in a Week
subtitle: This week I pushed splashboard to v1.2.0, added 27 new fetchers, and completed the deariary_* family while
  cleaning up the project structure.
overview: >
  The week started with a burst of activity around splashboard, where I merged 19 pull requests that added a host of new
  fetchers and refactored the code_* family. The release of v1.2.0 introduced linear_issues, linear_notifications, and
  linear_cycle fetchers, plus random_dog and random_cat for a splash of fun.


  Parallel to that, I also tackled the deariary_* fetcher family, which now provides safe, cached, and host‑pinned diary
  entries. The refactor to tokei for code_* metrics brought code_loc and code_comments into the fold, while the new
  git_churn and git_age fetchers give us instant repo health insights. I spent a lot of time reviewing and approving PRs
  for other repos like gitlogue and mdts, keeping the overall ecosystem healthy.


  The week ended with a focused push to the unhappychoice.com website, adding an /oss/ showcase page and refreshing data
  scripts, plus a bump of dependencies across several projects. Looking ahead, I’ll be polishing the new fetchers’ test
  coverage and preparing a blog post about the new project_codebase preset.
summaries:
  - type: repo-summary
    heading: splashboard Dominates the Week
    body: I logged 19 PRs in splashboard, including the v1.2.0 release and a dozen new fetchers that cover code metrics,
      churn, and random media. The repo saw 1,500+ lines added and 200 lines removed, a net +1,300 LOC. The focus was on
      expanding the fetcher family while tightening tests.
    chips:
      - label: unhappychoice/splashboard
        value: 19 PRs
        color: default
      - label: lines
        value: +1,300
        color: green
      - label: merged
        value: "83"
        color: green
      - label: opened
        value: "91"
        color: red
  - type: deep-dive
    heading: New Fetcher Explosion
    body: "I added 27 new fetchers in a single sprint: code_loc, code_comments, code_largest_files, git_churn, git_age, and
      several random media fetchers. Each fetcher is a single‑shape renderer, making it trivial to plug into the preset
      system. The refactor to tokei reduced the code path count from 14 to 8 shapes in the code_* family."
    chips:
      - label: fetchers
        value: "27"
        color: default
      - label: shapes
        value: "8"
        color: green
      - label: tokei
        value: used
        color: default
  - type: activity-pattern
    heading: Commit Rhythm & Burst Days
    body: The commit graph shows a dramatic surge on May 1st with 290 commits, a peak that eclipsed the rest of the week.
      Other high‑activity days were Thursday (179) and Wednesday (118). The pattern suggests I front‑loaded the week
      with a heavy push and then tapered off to focus on reviews.
    chips:
      - label: peak
        value: May 1 290
        color: green
      - label: avg/day
        value: "138"
        color: default
  - type: review-summary
    heading: Cross‑Project Collaboration
    body: I approved 29 reviews across eight repos, including three major dependency bumps in gitlogue, mdts, and
      circleci-tools. The reviews were mostly straightforward, but the deariary_* PR required a multi‑author discussion
      to nail the cache‑key logic.
    chips:
