  - type: review-summary
    heading: 52 approvals, zero rejections
    body: "Every single one of the 52 reviews this week was an approval — which makes sense given the nature of the work:
      Dependabot PRs with predictable, mechanical diffs. mdts alone accounted for at least 9 of those reviews. The
      review cadence across irasutoya-tools, bitflyer-tools, and circleci-tools repos shows that even cross-org
      maintenance gets proper review treatment rather than just auto-merging."
    chips:
      - label: reviews
