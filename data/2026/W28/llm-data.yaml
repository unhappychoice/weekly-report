        value: automated pricing sync
        color: default
      - label: cadence
        value: daily
        color: green
  - type: commit-summary
    heading: 292 commits, two monster Mondays
    body: "Monday (79 commits) and Thursday (78 commits) were the twin peaks of the week — likely the days when the
      Dependabot queue got processed in bulk. The week never really went quiet, with even Sunday landing 30 commits. The
      commit messages are almost entirely merge commits for dependency PRs, with the standout exception being
      'fix(clippy): remove useless borrow in println! argument' in gittype — a human wrote that one."
    chips:
      - label: total commits
        value: "292"
        color: default
