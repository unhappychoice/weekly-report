        value: "5"
        color: default
      - label: issues opened
        value: "0"
        color: default
  - type: deep-dive
    heading: splashboard's automated LLM pricing sync
    body: "The 'chore: sync llm pricing from LiteLLM' PR is the most interesting automation story of the week. splashboard
      has a daily job that refreshes data/llm_pricing.json from LiteLLM's price table, and the PR checklist explicitly
      guards against order-of-magnitude jumps and silently disappeared models. This is careful, production-grade
      automation — not just a cron job, but one with built-in sanity checks baked into the review process."
    chips:
      - label: repo
        value: unhappychoice/splashboard
        color: default
