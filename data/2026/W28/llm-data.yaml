title: "292 commits across 17 repos: the great dependency harvest of July 2026"
subtitle: A week-long sweep of rubocop-ast, language_server-protocol, and MUI upgrades across the entire portfolio, plus
  a Clippy fix in gittype and automated LLM pricing sync in splashboard.
overview: >
  This week was defined by breadth rather than depth: 292 commits spread across at least 17 repositories, almost
  entirely driven by dependency maintenance. rubocop-ast 1.50.0 and language_server-protocol 3.17.0.6 landed in
  basically every Ruby project in the portfolio simultaneously — irasutoya, irasutoya-cli, circleci-cli, bitflyer,
  bitflyer-cli, slack_channel_stats, terminal_image — like a coordinated dependency blitz. The sheer coordination of
  merging the same bumps across so many repos in one week is its own kind of discipline.


  The most technically interesting moment came from gittype, where a Clippy lint for useless borrows in println!
  arguments got fixed manually — a small but satisfying code-quality win amid all the automated churn. splashboard also
  got a genuinely useful automated commit: the daily LLM pricing sync from LiteLLM, keeping token cost data fresh
  without manual intervention. mdts was the busiest single repo with 11 PRs, sweeping through MUI 9.2.0, webpack
  5.108.4, webpack-cli 7.2.1, and multiple typescript-eslint 8.63.0 bumps across both root and frontend packages.


  52 reviews this week — all approvals — spread across the full portfolio, which tells the real story: this was a week
  of being the responsible maintainer, keeping the dependency graph green and the CI passing across a large personal
  project surface area.
summaries:
  - type: deep-dive
    heading: The rubocop-ast 1.50.0 sweep
    body: rubocop-ast 1.50.0 (released 2026-07-04, right before the week started) triggered a cascade of Dependabot PRs
      across every Ruby project in the portfolio. irasutoya, irasutoya-cli, circleci-cli, bitflyer, bitflyer-cli,
      slack_channel_stats, and terminal_image all got the bump — seven repos, same one-liner change, all merged and
      approved this week. language_server-protocol 3.17.0.6 followed the exact same pattern across the same repos. It's
      dependency dominoes at scale.
    chips:
      - label: repos updated
        value: "7"
        color: default
      - label: gem
        value: rubocop-ast 1.50.0
        color: default
      - label: also swept
        value: LSP 3.17.0.6
        color: default
  - type: repo-summary
    heading: 17 repos, one week, zero issues opened
    body: mdts led the pack with 11 PRs — the MUI 9.2.0 upgrade alone touched mui/material, mui/icons-material, and the
      webpack toolchain. circleci-tools/Norimaki got Kotest 6.2.2 bumps via Gradle. cycle-flyer jumped to Electron
      43.1.0. The portfolio spans Rust, Ruby, TypeScript, Kotlin, and JavaScript, and this week every ecosystem got
      touched.
    chips:
      - label: repos active
        value: "17"
        color: default
