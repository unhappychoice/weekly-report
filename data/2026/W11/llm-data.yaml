highlights:
  - type: pr
    title: "feat: generate per-article OGP images at build time"
    repo: deariary/blog
    meta: merged · +703 -1 · 8 files
    body: This PR introduced build-time Open Graph image generation for each blog post, using satori and resvg to create
      branded images matching the frontend's share cards. It significantly improves social sharing previews and required
      careful design token alignment.
    url: https://github.com/deariary/blog/pull/6
  - type: pr
    title: "feat: add scheduled publishing by filtering future-dated posts"
    repo: deariary/blog
    meta: merged · +54 -41 · 9 files
    body: This PR added the core scheduled publishing feature by filtering posts with future pubDates at build time. It also
      extracted shared helpers (`isNewsPost`, `postPath`) to eliminate duplication across seven route files, cleaning up
      the content pipeline.
    url: https://github.com/deariary/blog/pull/9
  - type: pr
    title: "fix: use UTC for pubDate comparison in scheduled publishing"
    repo: deariary/blog
    meta: merged · +3 -3 · 1 file
    body: "A critical fix for the scheduled publishing feature: by switching to UTC via `Date.UTC()` for pubDate
      comparisons, it prevents posts from being incorrectly excluded when Cloudflare Pages builds in UTC and the pubDate
      falls on the current UTC day."
    url: https://github.com/deariary/blog/pull/10
  - type: pr
    title: "feat: dynamic sitemap/robots strategy for public pages"
    repo: deariary/frontend
    meta: merged · +128 -5 · 6 files
    body: This PR implemented a dynamic sitemap strategy in the frontend that fetches the sitemap from the backend and
      updates robots.txt to allow public profile paths (`/u/`). It's a key SEO improvement that automatically indexes
      user-generated content without manual updates.
    url: https://github.com/deariary/frontend/pull/442
