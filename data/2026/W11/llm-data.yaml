  - type: bug-fix-roundup
    heading: Locale, CORS, and GDPR fixes polish the experience
    body: "Three distinct bug classes were addressed: locale resolution on public profiles now correctly falls back to the
      profile owner's setting instead of browser language; blog analytics requests were unblocked by adding
      `blog.deariary.com` to CORS origins; and GDPR data deletion now properly cascades to `analytics_events` and
      `user_milestones` to prevent orphaned records and FK constraint failures."
