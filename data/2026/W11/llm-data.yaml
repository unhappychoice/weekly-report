    body: The bump from 0.0.4 to 0.1.0 in gitlogue's Dart grammar is the week's most substantive change. Tree-sitter grammar
      updates often include parser improvements, new syntax nodes, or performance enhancements that directly affect
      gitlogue's ability to generate accurate commit logs for Dart projects. This PR is still open, indicating active
      discussion or testing needed for the breaking changes.
