      user-facing improvement that makes the tool more accessible.
    url: https://github.com/unhappychoice/gittype/pull/391
  - type: pr
    title: "chore(deps): Bump mermaid from 11.12.3 to 11.13.0 in /packages/frontend"
    repo: unhappychoice/mdts
    meta: merged · +105 -176 · 2 files
