  - type: lp-enhancements
    heading: Landing page gets dark mode and official profile link
    body: The deariary landing page launched dark mode with system preference detection and a manual toggle. Simultaneously,
      an official public profile link (`@deariaryapp`) was added in three strategic locations, requiring updates to 42
      locale files. These changes strengthen branding and provide a consistent entry point to the app's social proof.
