title: Scheduled publishing and per-article OGP images land in deariary blog
subtitle: The blog now supports scheduling posts by pubDate and generates unique Open Graph images for each article at
  build time, with a critical timezone fix.
overview: >
  This week was dominated by deep work on the deariary project—a diary application—with a laser focus on the blog
  subsystem and SEO infrastructure. The most substantial narrative centered on two major, interdependent features:
  scheduled publishing and per-article Open Graph image generation, both of which required careful coordination across
  the content pipeline and build process. A critical timezone bug surfaced immediately after the initial publishing
  feature, turning a straightforward addition into a debugging saga that highlighted the perils of date handling in
  distributed systems.


  Concurrently, a cross-repo SEO initiative came to fruition with a dynamic sitemap endpoint in the backend and a
  consuming strategy in the frontend, automatically indexing public profiles and shared links. The landing page also
  received meaningful polish with dark mode and an official profile link. Throughout, a series of targeted bug
  fixes—locale resolution, CORS, GDPR deletion—addressed technical debt and compliance gaps that had been lurking in the
  margins.


  The rhythm was intensely focused: long stretches of solitary coding on complex features, punctuated by quick, precise
  bug fixes and review cycles. The work demonstrated a mature ability to ship user-facing features while simultaneously
  hardening the underlying platform.
summaries:
  - type: feature-summary
    heading: Blog gains scheduled publishing and per-article OGP images
    body: The blog now supports scheduling posts by pubDate, filtering future-dated content at build time. A critical
      follow-up fixed timezone handling to use UTC, preventing posts from disappearing on Cloudflare's UTC build
      servers. Additionally, each article now generates a unique, branded Open Graph image at build time using satori
      and resvg, dramatically improving social sharing previews.
    chips:
      - label: scheduled publishing
        value: 2 PRs
        color: default
      - label: OGP images
        value: 1 PR (+703 lines)
        color: default
      - label: timezone fix
        value: 1 PR (+3 -3)
        color: default
      - label: build tooling
        value: satori + resvg
        color: default
  - type: seo-improvements
    heading: Dynamic sitemap and robots strategy for public pages
    body: A new `GET /sitemap` endpoint in the backend dynamically lists all public profiles and shared links with proper
      SEO metadata. The frontend consumes this via a new `sitemap.ts`, and `robots.ts` was updated to allow `/u/` paths
      and reference the dynamic sitemap. This ensures user-generated content is properly indexed without manual
      intervention.
    chips:
