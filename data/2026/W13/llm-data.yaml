  - type: contribution-summary
    heading: External Contribution to committers.top
    body: I opened a PR in ashkulz/committers.top to fix user search sorting by switching from GraphQL to REST API. The
      issue was GitHub's GraphQL not supporting `sort:followers` for user search, causing non-deterministic results.
      This change adds 321 lines and removes 161 to ensure accurate follower-based rankings.
