  - type: content-creation
    heading: Reflecting on Unemployment in Japanese
    body: "I published a blog post titled '今の無職期間にしていること', sharing my experiences and principles during unemployment. The
      post covers four OSS projects totaling around 6,000 stars and three guiding principles: inventing, prioritizing
      UI/UX, and designing with marketing in mind. This personal narrative adds depth to the technical blog and connects
      with readers on a human level."
