title: "CSS View Transitions API: fixing flash and adding smooth fades in my blog"
subtitle: Implemented smooth page transitions using the View Transitions API and debugged a flash issue caused by
  mismatched background colors and transition durations.
overview: >
  The week exploded with 120 commits and 68 reviews, starting with a massive dependency update sprint across 8 different
  repositories. I automated Ruby and Rust dependency bumps for both my own projects and several external tooling repos,
  handling multiple version bumps for `ffi`, `parser`, `insta`, and `uuid`.


  The narrative pivot came when I shifted from maintenance to user experience work on my blog. I implemented the CSS
  View Transitions API for smooth cross-page fades, but immediately hit a visual bug: pages flashed black during
  transitions. Debugging revealed mismatched background colors between `html` and `body` elements combined with
  asymmetric fade durations (0.2s out, 0.3s in) created a transparency window.


  I wrapped the week by writing a reflective Japanese blog post about my OSS journey during unemployment, sharing the
  three principles that guided my 6,000-star project suite. The open PR in `ashkulz/committers.top` to fix user search
  by switching to REST API also continued to evolve, highlighting my cross-organization contributions beyond my own
  ecosystem.
summaries:
  - type: repo-summary
    heading: Blog transforms, mdts evolves, dependency marathon elsewhere
    body: "My personal repos focused on UX improvements: `unhappychoice/blog` got View Transitions and a reflective post,
      while `unhappychoice/mdts` received task list checkbox styling. Meanwhile, I contributed dependency updates to 7
      external organizations including `circleci-tools`, `irasutoya-tools`, and `bitflyer-tools`."
    chips:
      - label: unhappychoice/mdts
        value: 11 PRs
        color: default
      - label: unhappychoice/blog
        value: 7 PRs
        color: default
      - label: External orgs
        value: "7"
        color: default
  - type: deep-dive
    heading: "View Transitions API: the flash that wasn't supposed to be"
    body: "Adding `@view-transition { navigation: auto }` created beautiful fades, but a black flash appeared. The culprit:
      `html` had no background (default white) while `body`/`#main` used `$color-dark`. With asymmetric durations (0.2s
      out vs 0.3s in), both pages hit low opacity simultaneously, revealing the white html background through the dark
      theme. Fixed by setting `html { background: $color-dark }`."
    chips:
      - label: PRs
        value: 2 (feat + fix)
        color: default
      - label: Root cause
        value: bg mismatch + duration asymmetry
        color: default
  - type: contribution-summary
    heading: Fixing search in ashkulz/committers.top and dependency stewardship
    body: Opened a substantial PR in `ashkulz/committers.top` (+321/-161 lines) to fix user search sorting by switching from
      broken GraphQL `sort:followers-desc` to the REST API. This addresses GitHub's lack of `sort:followers` support for
      user search, which caused non-deterministic rankings. Simultaneously, I pushed 15+ dependency bumps across Rust
      and Ruby ecosystems, handling multiple version bumps for the same libraries across different repos.
    chips:
