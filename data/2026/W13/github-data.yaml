  - title: "fix: prevent flash during view transition"
    body: |-
      - View transition 時にページが一瞬暗く(黒く)フラッシュする問題を修正
      - fade-out (0.2s) と fade-in (0.3s) の duration が異なっていたため、中間地点で両方の opacity が低くなり背景色が透けていた
      - `html` に背景色が未設定(デフォルト白)で、`body`/`#main` の `$color-dark` と不一致だった
